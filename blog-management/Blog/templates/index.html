 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog | Management System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar/Navigation -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-feather-alt"></i>
                <span>DevBlog</span>
            </div>
            <div class="actions">
                <button id="newPostBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> New Post
                </button>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-header">
                <h1>Blog Management</h1>
                <p>Create, edit, and keep track of your thoughts.</p>
            </div>

            <div id="postsList" class="posts-grid">
                <!-- Posts will be injected here -->
                <div class="loader">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create/Edit Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="postForm">
                <input type="hidden" id="postId">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter post title" required>
                </div>
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" placeholder="Author name" required>
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" rows="8" placeholder="Write your content here..." required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
